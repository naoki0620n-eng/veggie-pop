<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>やさいくだものPOP</title>
  <meta name="theme-color" content="#2e7d32">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="POP">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">やさいくだものPOP</h1>
    <button id="settingsBtn" class="icon-btn" aria-label="設定">⚙️</button>
  </header>

  <main class="container">
    <section class="input-area">
      <input
        id="productInput"
        class="product-input"
        type="text"
        inputmode="text"
        autocomplete="off"
        placeholder="例: トマト / シャインマスカット"
        aria-label="商品名">

      <label for="photoInput" class="photo-btn">📷 写真を選ぶ（任意）</label>
      <input id="photoInput" class="photo-input" type="file" accept="image/*" aria-label="商品写真" hidden>

      <div id="preview" class="preview" hidden>
        <img id="previewImg" class="preview-img" alt="選択した写真">
        <button id="removePhotoBtn" class="remove-photo-btn" type="button">×取消</button>
      </div>

      <button id="generateBtn" class="primary-btn">POPを作る</button>
    </section>

    <p id="message" class="message" role="alert" hidden></p>

    <section id="results" class="results" hidden>
      <article class="card">
        <h2 class="card-title">商品名</h2>
        <div class="name-row">
          <span id="out-emoji" class="out-emoji" aria-hidden="true"></span>
          <input id="out-name" class="edit-input name-input" type="text" aria-label="商品名">
        </div>
      </article>

      <article class="card">
        <h2 class="card-title">産地</h2>
        <input id="out-origin" class="edit-input" type="text" aria-label="産地">
      </article>

      <article class="card card-pop">
        <h2 class="card-title">POPの一言</h2>
        <textarea id="out-pop" class="edit-textarea pop-textarea" rows="2" aria-label="POPの一言"></textarea>
      </article>

      <article class="card">
        <h2 class="card-title">おすすめ料理</h2>
        <div class="dish-row">
          <span class="dish-no">①</span>
          <input id="out-dish1-name" class="edit-input dish-name" type="text" placeholder="料理名" aria-label="料理1の名前">
          <input id="out-dish1-desc" class="edit-input dish-desc" type="text" placeholder="説明" aria-label="料理1の説明">
        </div>
        <div class="dish-row">
          <span class="dish-no">②</span>
          <input id="out-dish2-name" class="edit-input dish-name" type="text" placeholder="料理名" aria-label="料理2の名前">
          <input id="out-dish2-desc" class="edit-input dish-desc" type="text" placeholder="説明" aria-label="料理2の説明">
        </div>
      </article>

      <div class="share-actions">
        <button id="shareBtn" class="primary-btn">LINEで共有</button>
        <button id="copyShareBtn" class="secondary-btn">コピー</button>
      </div>
    </section>

    <p id="placeholder" class="placeholder">写真を選ぶか商品名を入力して「POPを作る」を押してください。</p>
  </main>

  <!-- 設定モーダル -->
  <div id="settingsModal" class="modal" hidden>
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="settingsHeading">
      <h2 id="settingsHeading" class="modal-title">設定</h2>
      <label for="apiKeyInput" class="field-label">Anthropic APIキー</label>
      <div class="key-input-row">
        <input id="apiKeyInput" class="product-input" type="password" autocomplete="off" placeholder="sk-ant-...">
        <button id="toggleKeyBtn" class="copy-btn" type="button">表示</button>
      </div>
      <p id="keyStatus" class="key-status"></p>
      <p class="hint">
        APIキーは
        <a href="https://console.anthropic.com/" target="_blank" rel="noopener">console.anthropic.com</a>
        で取得できます。キーはこの端末のブラウザ内(localStorage)にのみ保存されます。
      </p>
      <div class="modal-actions">
        <button id="saveKeyBtn" class="primary-btn">保存</button>
        <button id="closeSettingsBtn" class="secondary-btn">閉じる</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
